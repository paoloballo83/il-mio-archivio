<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Il Mio Archivio">
<meta name="theme-color" content="#E65100">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Il Mio Archivio</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --orange: #E65100;
  --orange-light: #FF6D00;
  --orange-dark: #BF360C;
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #252525;
  --border: #2e2e2e;
  --text: #f0f0f0;
  --text-muted: #888;
  --radius: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

.header {
  background: linear-gradient(135deg, var(--orange-dark) 0%, var(--orange-light) 100%);
  padding: 48px 16px 16px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 4px 24px rgba(230,81,0,0.35);
}
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
.header h1 span { opacity: 0.75; font-weight: 400; }
.header-right { display: flex; gap: 8px; align-items: center; }
.btn-new-section {
  background: rgba(255,255,255,0.22); border: none; color: white;
  padding: 8px 14px; border-radius: 20px; font-family: 'Outfit', sans-serif;
  font-size: 13px; font-weight: 600; cursor: pointer;
}
.sync-status {
  font-size: 11px; color: rgba(255,255,255,0.8);
  display: flex; align-items: center; gap: 4px;
}
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #4caf50; }
.sync-dot.syncing { background: #ffeb3b; animation: pulse 1s infinite; }
.sync-dot.error { background: #f44336; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.search-bar {
  display: flex; align-items: center;
  background: rgba(0,0,0,0.25); border-radius: 10px; padding: 0 12px; gap: 8px;
}
.search-bar input {
  background: none; border: none; outline: none; color: white; font-family: 'Outfit', sans-serif;
  font-size: 15px; padding: 10px 0; flex: 1; width: 100%;
}
.search-bar input::placeholder { color: rgba(255,255,255,0.55); }

.main { padding: 16px; padding-bottom: 80px; }

/* LOADING */
.loading-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 60vh; gap: 16px; color: var(--text-muted);
}
.spinner {
  width: 40px; height: 40px; border: 3px solid var(--border);
  border-top-color: var(--orange); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.section-card {
  background: var(--surface); border-radius: var(--radius);
  margin-bottom: 14px; overflow: hidden; border: 1px solid var(--border);
  animation: fadeIn 0.25s ease;
}
@keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; cursor: pointer; user-select: none;
}
.section-header-left { display: flex; align-items: center; gap: 10px; }
.section-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--orange-dark), var(--orange-light));
  display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0;
}
.section-title { font-size: 16px; font-weight: 600; }
.section-count { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
.section-chevron { color: var(--text-muted); font-size: 14px; transition: transform 0.2s; }
.section-chevron.open { transform: rotate(90deg); }
.section-body { display: none; border-top: 1px solid var(--border); }
.section-body.open { display: block; }

.item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
}
.item:last-child { border-bottom: none; }
.item-icon { font-size: 22px; flex-shrink: 0; margin-top: 2px; }
.item-content { flex: 1; min-width: 0; }
.item-name { font-size: 14px; font-weight: 600; word-break: break-word; }
.item-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
.item-note { font-size: 13px; color: #bbb; margin-top: 5px; line-height: 1.4; word-break: break-word; }
.item-link { font-size: 13px; color: var(--orange); margin-top: 4px; word-break: break-all; }
.item-actions { display: flex; gap: 6px; flex-shrink: 0; }
.btn-icon { background: var(--surface2); border: none; color: var(--text-muted); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
.item-img-thumb {
  width: 72px; height: 72px; border-radius: 10px; object-fit: cover;
  cursor: pointer; border: 1px solid var(--border); flex-shrink: 0;
}

.add-item-bar { padding: 10px 16px 14px; display: flex; flex-wrap: wrap; gap: 8px; }
.btn-add-type {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 8px 14px; border-radius: 20px;
  font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer;
}
.fab-delete-section {
  background: none; border: none; color: var(--text-muted); font-size: 12px;
  font-family: 'Outfit', sans-serif; cursor: pointer; padding: 0 16px 14px;
}
.empty-state { text-align: center; padding: 28px 16px; color: var(--text-muted); font-size: 14px; }

/* MODALI */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.75); z-index: 200; align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border-radius: 20px 20px 0 0;
  padding: 20px 16px 36px; width: 100%; max-width: 520px;
  animation: slideUp 0.25s ease; max-height: 92vh; overflow-y: auto;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.modal label { font-size: 13px; color: var(--text-muted); display: block; margin-bottom: 4px; margin-top: 14px; }
.modal input, .modal textarea {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-family: 'Outfit', sans-serif;
  font-size: 15px; padding: 11px 13px; outline: none;
}
.modal textarea { height: 80px; resize: none; }
.modal input:focus, .modal textarea:focus { border-color: var(--orange); }
.modal-footer { display: flex; gap: 10px; margin-top: 20px; }
.btn-cancel { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 13px; border-radius: 12px; font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; }
.btn-save { flex: 2; background: linear-gradient(135deg, var(--orange-dark), var(--orange-light)); border: none; color: white; padding: 13px; border-radius: 12px; font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; }

.img-upload-sources { display: flex; gap: 10px; margin-top: 8px; }
.btn-img-source {
  flex: 1; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 12px; border-radius: 10px;
  font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer;
}
.img-preview-box {
  margin-top: 10px; border: 2px dashed var(--border); border-radius: 12px;
  padding: 16px; text-align: center; color: var(--text-muted); font-size: 13px;
}
.img-preview-box.has-img { border-color: var(--orange); padding: 4px; }
.img-preview-box img { width: 100%; max-height: 180px; object-fit: cover; border-radius: 10px; display: block; }

.emoji-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.emoji-btn { width: 40px; height: 40px; border-radius: 10px; background: var(--surface2); border: 2px solid transparent; font-size: 20px; cursor: pointer; }
.emoji-btn.selected { border-color: var(--orange); }

.lightbox {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.93); z-index: 300; align-items: center; justify-content: center;
}
.lightbox.open { display: flex; }
.lightbox img { max-width: 95vw; max-height: 90vh; border-radius: 10px; object-fit: contain; }
.lightbox-close {
  position: absolute; top: 20px; right: 20px;
  background: rgba(255,255,255,0.15); border: none; color: white;
  width: 42px; height: 42px; border-radius: 50%; font-size: 20px; cursor: pointer;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>📁 Il Mio <span>Archivio</span></h1>
    <div class="header-right">
      <div class="sync-status">
        <div class="sync-dot" id="syncDot"></div>
        <span id="syncLabel">sync</span>
      </div>
      <button class="btn-new-section" onclick="openSectionModal()">＋ Sezione</button>
    </div>
  </div>
  <div class="search-bar">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="Cerca..." oninput="renderAll()">
  </div>
</div>

<div class="main" id="mainContent">
  <div class="loading-screen">
    <div class="spinner"></div>
    <div>Connessione al cloud...</div>
  </div>
</div>

<!-- MODAL ITEM -->
<div class="modal-overlay" id="itemModal">
  <div class="modal">
    <div class="modal-title" id="itemModalTitle">Aggiungi</div>
    <div id="f_note" style="display:none">
      <label>Titolo</label>
      <input type="text" id="n_name" placeholder="es. Scadenza DURC">
      <label>Testo / Note</label>
      <textarea id="n_text" placeholder="Scrivi qui..."></textarea>
    </div>
    <div id="f_link" style="display:none">
      <label>Nome</label>
      <input type="text" id="l_name" placeholder="es. Portale INPS">
      <label>URL</label>
      <input type="url" id="l_url" placeholder="https://...">
      <label>Note (opzionale)</label>
      <textarea id="l_note" placeholder="Descrizione..."></textarea>
    </div>
    <div id="f_image" style="display:none">
      <label>Nome</label>
      <input type="text" id="i_name" placeholder="es. Foto cantiere">
      <label>Sorgente immagine</label>
      <div class="img-upload-sources">
        <button class="btn-img-source" onclick="document.getElementById('fc').click()">📷 Fotocamera</button>
        <button class="btn-img-source" onclick="document.getElementById('fg').click()">🖼️ Galleria</button>
      </div>
      <input type="file" id="fc" accept="image/*" capture="environment" style="display:none" onchange="handleImg(this)">
      <input type="file" id="fg" accept="image/*" style="display:none" onchange="handleImg(this)">
      <div class="img-preview-box" id="imgBox">Nessuna immagine selezionata</div>
      <label>Note (opzionale)</label>
      <textarea id="i_note" placeholder="Descrizione..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeItemModal()">Annulla</button>
      <button class="btn-save" onclick="saveItem()">Salva</button>
    </div>
  </div>
</div>

<!-- MODAL SEZIONE -->
<div class="modal-overlay" id="sectionModal">
  <div class="modal">
    <div class="modal-title">Nuova Sezione</div>
    <label>Nome</label>
    <input type="text" id="sec_name" placeholder="es. Cantiere, Famiglia...">
    <label>Icona</label>
    <div class="emoji-grid" id="emojiGrid"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeSectionModal()">Annulla</button>
      <button class="btn-save" onclick="saveSection()">Crea</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lbImg" src="">
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBTMgH3yzc5bHhThTCH5fyX8zw9MOZ10BA",
  authDomain: "il-mio-archivio.firebaseapp.com",
  databaseURL: "https://il-mio-archivio-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "il-mio-archivio",
  storageBucket: "il-mio-archivio.firebasestorage.app",
  messagingSenderId: "1039070000359",
  appId: "1:1039070000359:web:f61b1586043038352ade42"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const DOC_REF = doc(db, "archivio", "dati");

// Expose to global scope
window._db = db;
window._docRef = DOC_REF;
window._setDoc = setDoc;
window._fbReady = false;

const EMOJIS = ['📁','🏗️','📄','📋','🔑','💼','🏠','⚙️','📊','🗂️','📌','🔧','📐','🏛️','💰','📱','🖥️','📸','🗒️','🔒','👷','📆','🚗','🏥','👨‍👩‍👧'];
let _emoji = '📁';
let _sid = null;
let _type = null;
let _imgData = null;
let _data = null;
let _saving = false;

function defaults() {
  return { sections: [
    {id:'s1', name:'Cantiere', icon:'🏗️', open:true, items:[]},
    {id:'s2', name:'CHT / Esame', icon:'📋', open:false, items:[]},
    {id:'s3', name:'Documenti Legali', icon:'⚖️', open:false, items:[]},
    {id:'s4', name:'Tecnico', icon:'⚙️', open:false, items:[]}
  ]};
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setSyncStatus(state) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  dot.className = 'sync-dot' + (state==='syncing'?' syncing':state==='error'?' error':'');
  lbl.textContent = state==='syncing'?'salvo...':state==='error'?'offline':'sync ✓';
}

async function saveToCloud() {
  if (!_data) return;
  _saving = true;
  setSyncStatus('syncing');
  try {
    await setDoc(DOC_REF, { payload: JSON.stringify(_data) });
    setSyncStatus('ok');
  } catch(e) {
    console.error(e);
    setSyncStatus('error');
    // fallback localStorage
    localStorage.setItem('archivio_v2', JSON.stringify(_data));
  }
  _saving = false;
}

// Carica dati iniziali e ascolta cambiamenti real-time
try {
  const snap = await getDoc(DOC_REF);
  if (snap.exists() && snap.data().payload) {
    _data = JSON.parse(snap.data().payload);
  } else {
    // Prima volta: usa localStorage se c'è, altrimenti defaults
    const local = localStorage.getItem('archivio_v2');
    _data = local ? JSON.parse(local) : defaults();
    await setDoc(DOC_REF, { payload: JSON.stringify(_data) });
  }
} catch(e) {
  console.warn('Firebase non raggiungibile, uso localStorage', e);
  const local = localStorage.getItem('archivio_v2');
  _data = local ? JSON.parse(local) : defaults();
  setSyncStatus('error');
}

window._fbReady = true;
renderAll();
setSyncStatus('ok');

// Real-time listener (aggiornamenti da altri dispositivi)
onSnapshot(DOC_REF, (snap) => {
  if (_saving) return;
  if (snap.exists() && snap.data().payload) {
    const remote = JSON.parse(snap.data().payload);
    _data = remote;
    renderAll();
  }
});

// ---- RENDER ----
window.renderAll = function() {
  if (!_data) return;
  const q = (document.getElementById('searchInput').value||'').toLowerCase().trim();
  const el = document.getElementById('mainContent');
  if (!_data.sections.length) {
    el.innerHTML = '<div class="empty-state">📭 Nessuna sezione. Premi "+ Sezione" per iniziare.</div>';
    return;
  }
  el.innerHTML = _data.sections.map(s => renderSec(s, q)).join('');
}

function renderSec(s, q) {
  const items = q
    ? s.items.filter(i => (i.name+i.note+(i.url||'')).toLowerCase().includes(q))
    : s.items;
  const open = s.open || !!q;
  const itemsHtml = items.length
    ? items.map(i => renderItem(s.id, i)).join('')
    : '<div class="empty-state">Nessun elemento in questa sezione</div>';
  return `<div class="section-card">
    <div class="section-header" onclick="toggleSec('${s.id}')">
      <div class="section-header-left">
        <div class="section-icon">${s.icon}</div>
        <div>
          <div class="section-title">${esc(s.name)}</div>
          <div class="section-count">${s.items.length} elementi</div>
        </div>
      </div>
      <span class="section-chevron ${open?'open':''}">▶</span>
    </div>
    <div class="section-body ${open?'open':''}">
      ${itemsHtml}
      <div class="add-item-bar">
        <button class="btn-add-type" onclick="openItemModal('${s.id}','note')">📝 Nota</button>
        <button class="btn-add-type" onclick="openItemModal('${s.id}','link')">🔗 Link</button>
        <button class="btn-add-type" onclick="openItemModal('${s.id}','image')">📸 Foto</button>
      </div>
      <button class="fab-delete-section" onclick="delSec('${s.id}')">🗑 Elimina sezione</button>
    </div>
  </div>`;
}

function renderItem(sid, item) {
  const date = item.date ? new Date(item.date).toLocaleDateString('it-IT') : '';
  const typeLabel = {note:'NOTA', link:'LINK', image:'FOTO'}[item.type] || '';
  let left = item.type==='image' && item.data
    ? `<img class="item-img-thumb" src="${item.data}" onclick="openLB('${sid}','${item.id}')" alt="">`
    : `<div class="item-icon">${{note:'📝',link:'🔗',image:'📸'}[item.type]||'📄'}</div>`;
  let extra = '';
  if (item.type==='link' && item.url)
    extra += `<div class="item-link"><a href="${esc(item.url)}" target="_blank">${esc(item.url)}</a></div>`;
  if (item.note) extra += `<div class="item-note">${esc(item.note)}</div>`;
  return `<div class="item">
    ${left}
    <div class="item-content">
      <div class="item-name">${esc(item.name)}</div>
      <div class="item-meta">${typeLabel}${date?' · '+date:''}</div>
      ${extra}
    </div>
    <div class="item-actions">
      <button class="btn-icon" onclick="delItem('${sid}','${item.id}')">🗑</button>
    </div>
  </div>`;
}

window.toggleSec = function(sid) {
  const s = _data.sections.find(x=>x.id===sid);
  if(s){s.open=!s.open; renderAll(); saveToCloud();}
}
window.delSec = function(sid) {
  if(!confirm('Eliminare questa sezione e tutto il suo contenuto?'))return;
  _data.sections = _data.sections.filter(s=>s.id!==sid);
  renderAll(); saveToCloud();
}
window.delItem = function(sid,iid) {
  if(!confirm('Eliminare questo elemento?'))return;
  const s=_data.sections.find(x=>x.id===sid);
  if(s){s.items=s.items.filter(i=>i.id!==iid); renderAll(); saveToCloud();}
}

// SECTION MODAL
window.openSectionModal = function() {
  _emoji='📁';
  document.getElementById('sec_name').value='';
  document.getElementById('emojiGrid').innerHTML = EMOJIS.map(e=>
    `<button class="emoji-btn ${e===_emoji?'selected':''}" onclick="pickEmoji(this,'${e}')">${e}</button>`
  ).join('');
  document.getElementById('sectionModal').classList.add('open');
}
window.closeSectionModal = function(){document.getElementById('sectionModal').classList.remove('open');}
window.pickEmoji = function(btn,e){
  _emoji=e;
  document.querySelectorAll('.emoji-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}
window.saveSection = function(){
  const name=document.getElementById('sec_name').value.trim();
  if(!name){alert('Inserisci un nome');return;}
  _data.sections.push({id:uid(),name,icon:_emoji,open:true,items:[]});
  closeSectionModal(); renderAll(); saveToCloud();
}

// ITEM MODAL
window.openItemModal = function(sid,type){
  _sid=sid; _type=type; _imgData=null;
  ['f_note','f_link','f_image'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('f_'+type).style.display='';
  ['n_name','n_text','l_name','l_url','l_note','i_name','i_note'].forEach(id=>{
    const el=document.getElementById(id); if(el)el.value='';
  });
  document.getElementById('imgBox').innerHTML='Nessuna immagine selezionata';
  document.getElementById('imgBox').classList.remove('has-img');
  const titles={note:'📝 Nuova Nota',link:'🔗 Nuovo Link',image:'📸 Nuova Foto'};
  document.getElementById('itemModalTitle').textContent=titles[type];
  document.getElementById('itemModal').classList.add('open');
}
window.closeItemModal = function(){document.getElementById('itemModal').classList.remove('open');}

window.saveItem = function(){
  const s=_data.sections.find(x=>x.id===_sid); if(!s)return;
  const item={id:uid(),type:_type,date:Date.now()};
  if(_type==='note'){
    item.name=document.getElementById('n_name').value.trim();
    item.note=document.getElementById('n_text').value.trim();
    if(!item.name){alert('Inserisci un titolo');return;}
  } else if(_type==='link'){
    item.name=document.getElementById('l_name').value.trim();
    item.url=document.getElementById('l_url').value.trim();
    item.note=document.getElementById('l_note').value.trim();
    if(!item.name||!item.url){alert('Inserisci nome e URL');return;}
  } else if(_type==='image'){
    item.name=document.getElementById('i_name').value.trim();
    item.note=document.getElementById('i_note').value.trim();
    item.data=_imgData;
    if(!item.name){alert('Inserisci un nome');return;}
    if(!item.data){alert("Seleziona un'immagine");return;}
  }
  s.items.unshift(item);
  closeItemModal(); renderAll(); saveToCloud();
}

window.handleImg = function(input){
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      const canvas=document.createElement('canvas');
      const MAX=1200; let w=img.width,h=img.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      _imgData=canvas.toDataURL('image/jpeg',0.80);
      const box=document.getElementById('imgBox');
      box.innerHTML=`<img src="${_imgData}">`;
      box.classList.add('has-img');
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
  input.value='';
}

window.openLB = function(sid,iid){
  const s=_data.sections.find(x=>x.id===sid); if(!s)return;
  const item=s.items.find(i=>i.id===iid); if(!item||!item.data)return;
  document.getElementById('lbImg').src=item.data;
  document.getElementById('lightbox').classList.add('open');
}
window.closeLightbox = function(){document.getElementById('lightbox').classList.remove('open');}

</script>
